<h1 id="count">0</h1>

<button onclick="add()">+1</button>
<button onclick="minus()">-1</button>

<script>
    let num = 0;

    function add() {
        num++;
        document.getElementById("count").innerText = num;
    }

    function minus() {
        num--;
        document.getElementById("count").innerText = num;
    }
</script>
