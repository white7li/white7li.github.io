<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Site</title>
</head>

<body style="text-align:center; margin-top:100px; font-family:Arial;">

    <h1 id="title">这是我的网站</h1>

    <p id="text">点击按钮试试</p>

    <button onclick="changeText()">点我</button>

    <script>
        function changeText() {
            document.getElementById("text").innerText = "你刚刚触发了 JavaScript";
            document.getElementById("title").innerText = "页面已被修改";
        }
    </script>

</body>
</html>
