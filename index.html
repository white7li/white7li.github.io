<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>点击计分游戏</title>

    <style>
        body {
            text-align: center;
            margin-top: 120px;
            font-family: Arial;
        }

        #score {
            font-size: 60px;
            margin: 20px;
        }

        button {
            font-size: 20px;
            margin: 10px;
            padding: 10px 20px;
            cursor: pointer;
        }

        #status {
            margin-top: 20px;
            font-size: 18px;
            color: gray;
        }
    </style>
</head>

<body>

    <h1>点击计分游戏</h1>

    <div id="score">0</div>

    <button onclick="add()">+1</button>
    <button onclick="minus()">-1</button>

    <div id="status">开始游戏</div>

   <script src="script.js"></script>

</body>
</html>
